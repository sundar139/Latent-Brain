dataset:
  name: mc_maze_large
  expected_hash: 074f6d693ba59b23c7e3449633d7c66171c9b52b22379047b414067036830c84
  raw_dir: data/raw/nlb/mc_maze_large
  original_bin_size_ms: 5

trial_source:
  type: trial_aware_raw
  allow_global_crop_to_min: false

window:
  name: behavior_speed_peak_centered_1p28s
  duration_seconds: 1.28
  extract_before_rebin: true

binning:
  target_bin_size_ms: 20

outer_cross_validation:
  source_summary_path: results/mc_maze_large/recommended_window_cv/recommended_window_cv_summary.json
  source_assignments_path: results/mc_maze_large/recommended_window_cv/recommended_window_fold_assignments.csv
  fold_count: 5
  repeats: 5
  base_seed: 2027
  reuse_exact_assignments: true
  reuse_exact_neuron_masks: true

inner_selection:
  enabled: true
  fold_count: 3
  base_seed: 4041
  metric: unified_bits_per_spike
  selection_rule: highest_mean
  tie_breakers:
    - lower_model_complexity
    - lower_smoothing_sigma
    - lower_regularization_search_index

scoring:
  reference_model: train_heldout_mean_rate
  include_poisson_constant: true
  min_rate_hz: 1.0e-4
  max_rate_hz: 500.0
  primary_metric: unified_bits_per_spike

methods:
  - name: train_mean_rate
    family: reference
    valid_model: false
    reportable_as_model_performance: false

  - name: factor_latent_fixed
    family: factor_latent
    valid_model: true
    reportable_as_model_performance: true
    hyperparameters:
      latent_dim: 8
      smoothing_sigma_ms: 200.0
      heldout_decoder_alpha: 10000.0
      standardize_features: true
      fit_intercept: true
      factor_analysis_random_state: 0

  - name: factor_latent_train_selected
    family: factor_latent
    valid_model: true
    reportable_as_model_performance: true
    search:
      latent_dim: [4, 8, 16]
      smoothing_sigma_ms: [120.0, 200.0]
      heldout_decoder_alpha: [1000.0, 10000.0]
      standardize_features: [true]
      fit_intercept: [true]
      factor_analysis_random_state: [0]

  - name: smoothed_cosmoothing_ridge
    family: ridge
    valid_model: true
    reportable_as_model_performance: true
    search:
      smoothing_sigma_ms: [80.0, 160.0, 240.0]
      alpha: [1000.0, 10000.0, 100000.0]
      standardize_features: [true]
      fit_intercept: [true]

  - name: reduced_rank_cosmoothing
    family: reduced_rank
    valid_model: true
    reportable_as_model_performance: true
    search:
      smoothing_sigma_ms: [80.0, 160.0]
      alpha: [1000.0, 10000.0]
      rank: [8, 16, 32]
      standardize_features: [true]
      fit_intercept: [true]

  - name: split_mean_rate_invalid
    family: invalid_control
    valid_model: false
    reportable_as_model_performance: false
    invalid_reason: "Uses evaluation-fold target counts."

statistics:
  confidence_interval: 0.95
  bootstrap_repeats: 10000
  bootstrap_seed: 1337
  comparison_unit: repeat
  hierarchical_bootstrap: true

selection:
  baseline_to_beat: factor_latent_fixed
  require_positive_paired_ci: true
  require_positive_fraction_minimum: 0.80
  retain_existing_baseline_when_inconclusive: true

inputs:
  recommended_window_summary_path: results/mc_maze_large/recommended_window_cv/recommended_window_cv_summary.json
  recommended_window_protocol_path: results/mc_maze_large/recommended_window_cv/recommended_window_protocol.yaml
  small_summary_path: results/mc_maze_small/recommended_window_cv/recommended_window_cv_summary.json

reporting:
  output_dir: results/mc_maze_large/baseline_suite
