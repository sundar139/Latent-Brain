dataset:
  name: mc_maze_small
  source: neural_latents_benchmark
  variant: small
  bin_size_ms: 5
  alignment_event: movement
  expected_format: nlb
  dataset_root: data/raw/nlb/mc_maze_small
  processed_root: data/processed/nlb/mc_maze_small
  output_filename: mc_maze_small_processed.npz
  metadata_filename: mc_maze_small_metadata.json
  provenance_filename: mc_maze_small_provenance.json

validation:
  require_behavior: true
  require_rates: false
  allow_missing_behavior: false
  min_trials: 1
  min_neurons: 1
  min_time_bins: 1

splits:
  seed: 2027
  train_fraction: 0.7
  validation_fraction: 0.15
  test_fraction: 0.15
  heldout_neuron_fraction: 0.25

trialization:
  train_file_pattern: "*desc-train_behavior+ecephys.nwb"
  test_file_pattern: "*desc-test_ecephys.nwb"
  start_field: start_time
  end_field: end_time
  align_field:
  align_range_ms:
  margin_ms: 0
  allow_nans: false
  signal_types:
    - spikes
    - heldout_spikes
  combine_heldout_spikes: true
  variable_length_policy: crop_to_min
  behavior_signal_types:
    - hand_pos
    - cursor_pos
  require_behavior: true
  behavior_variable_length_policy: crop_to_spike_window
  allow_behavior_nans: false

provenance:
  hash_size_limit_mb: 256
