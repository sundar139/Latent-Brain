dataset:
  name: mc_maze_large
  expected_hash: 074f6d693ba59b23c7e3449633d7c66171c9b52b22379047b414067036830c84

trial_source:
  type: trial_aware_raw
  allow_global_crop_to_min: false

window:
  name: behavior_speed_peak_centered_1p28s
  duration_seconds: 1.28
  extract_before_rebin: true

binning:
  target_bin_size_ms: 20

outer_protocol:
  assignments_path: results/mc_maze_large/recommended_window_cv/recommended_window_fold_assignments.csv
  baseline_scores_path: results/mc_maze_large/baseline_suite/outer_fold_scores.csv
  selected_hyperparameters_path: results/mc_maze_large/baseline_suite/selected_hyperparameters.csv
  protocol_path: results/mc_maze_large/recommended_window_cv/recommended_window_protocol.yaml
  fold_count: 5
  repeats: 5
  base_seed: 2027
  reuse_exact_assignments: true
  reuse_exact_neuron_masks: true

model:
  method: factor_latent_train_selected
  require_per_fold_selected_hyperparameters: true
  factor_analysis_random_state: 0

behavior:
  position_channels:
    - hand_pos_x
    - hand_pos_y
    - cursor_pos_x
    - cursor_pos_y
  derive:
    hand_velocity: true
    cursor_velocity: true
    hand_speed: true
    cursor_speed: true
    endpoint_direction: true
    endpoint_distance: true

decoding:
  continuous_targets:
    - hand_pos_x
    - hand_pos_y
    - hand_vel_x
    - hand_vel_y
    - hand_speed
    - cursor_pos_x
    - cursor_pos_y
    - cursor_vel_x
    - cursor_vel_y
    - cursor_speed
  categorical_targets:
    endpoint_direction_bins: 8
  decoder:
    type: ridge
    alpha_grid:
      - 1.0
      - 10.0
      - 100.0
      - 1000.0
      - 10000.0
  inner_folds: 3
  selection_metric_continuous: mean_r2
  selection_metric_categorical: balanced_accuracy

geometry:
  trajectory_dimensions: 3
  direction_bins: 8
  distance_bins: 4
  minimum_trials_per_condition: 5
  compute_condition_centroids: true
  compute_within_between_distance: true
  compute_temporal_separability: true
  compute_trajectory_curvature: true
  compute_path_length: true

alignment:
  method: orthogonal_procrustes
  fit_using_outer_training_only: true
  reference_repeat: 0
  reference_fold: 0
  minimum_shared_conditions: 4

stability:
  compare_outer_folds: true
  compare_repeats: true
  compare_neuron_masks: true
  compare_factor_analysis_states: true
  factor_analysis_states:
    - 0
    - 2027
    - 2028
    - 2029
    - 2030

controls:
  permutation_repeats: 100
  permutation_seed: 1337
  shuffle_behavior_across_trials: true
  circular_shift_behavior_within_trials: true
  shuffle_endpoint_direction: true
  preserve_training_only_fit: true

statistics:
  confidence_interval: 0.95
  bootstrap_repeats: 10000
  bootstrap_seed: 1337
  comparison_unit: repeat

claim_safety:
  require_out_of_fold_analysis: true
  prohibit_causal_claims: true
  prohibit_direct_small_large_performance_claims: true
  prohibit_official_leaderboard_claims: true

reporting:
  output_dir: results/mc_maze_large/latent_interpretability
