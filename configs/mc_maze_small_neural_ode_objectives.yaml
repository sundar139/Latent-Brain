dataset:
  name: mc_maze_small
  processed_path: data/processed/nlb/mc_maze_small/mc_maze_small_processed.npz
  expected_hash: 7ed048df5fab3cb8e7c82957c24619a29154800364231467af2deaba65fb6d9f
  original_bin_size_ms: 5

splits:
  seed: 2027
  train_fraction: 0.7
  validation_fraction: 0.15
  test_fraction: 0.15
  heldout_neuron_fraction: 0.25

window:
  duration_seconds: 1.28
  crop_policy: from_start

binning:
  target_bin_size_ms: 20

runtime:
  device: cuda
  fail_if_cuda_unavailable: true

scoring:
  reference_model: train_heldout_mean_rate
  include_poisson_constant: true
  min_rate_hz: 1.0e-4
  max_rate_hz: 500.0
  primary_split: validation
  primary_metric: unified_bits_per_spike

search:
  max_runs: 8
  run_order: deterministic
  selection_metric: validation_unified_bits_per_spike
  selection_mode: max

base_model:
  name: neural_ode_objectives
  input_neuron_group: heldin
  output_dim: all
  batch_size: 4
  encoder_hidden_dim: 64
  drift_hidden_dim: 64
  diffusion_hidden_dim: 32
  latent_dim: 32
  factor_dim: 32
  input_dropout_rate: 0.10
  heldout_loss_weight: 6.0
  heldin_loss_weight: 1.0
  kl_warmup_epochs: 10
  kl_scale: 0.01
  drift_regularization: 1.0e-4
  learning_rate: 7.5e-4
  scheduler: cosine
  weight_decay: 1.0e-5
  gradient_clip_norm: 5.0
  loss_normalization: per_observed_spike_bin
  model_dropout: 0.0
  min_rate_hz: 1.0e-4
  max_rate_hz: 500.0
  dt_seconds: 0.02
  diffusion_scale: 0.0
  epochs: 50
  checkpoint_metric: validation_total_loss
  checkpoint_mode: min
  save_unified_checkpoints: true
  evaluate_checkpoints_by_unified_metric: true

objective_variants:
  - name: refined_baseline
    heldin_loss_weight: 1.0
    heldout_loss_weight: 6.0
    zero_count_weight: 1.0
    positive_count_weight: 1.0
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-4
    notes: "Accepted deterministic refinement objective."

  - name: heldout_heavy
    heldin_loss_weight: 0.5
    heldout_loss_weight: 10.0
    zero_count_weight: 1.0
    positive_count_weight: 1.0
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-4
    notes: "Tests whether held-out prediction is underweighted."

  - name: heldout_dominant_low_kl
    heldin_loss_weight: 0.25
    heldout_loss_weight: 12.0
    kl_scale: 0.005
    zero_count_weight: 1.0
    positive_count_weight: 1.0
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-5
    notes: "Tests weaker latent regularization with stronger held-out emphasis."

  - name: positive_weighted
    heldin_loss_weight: 0.5
    heldout_loss_weight: 8.0
    zero_count_weight: 0.75
    positive_count_weight: 2.0
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-4
    notes: "Tests sparse-count imbalance."

  - name: zero_downweighted
    heldin_loss_weight: 0.5
    heldout_loss_weight: 8.0
    zero_count_weight: 0.5
    positive_count_weight: 1.5
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-4
    notes: "Tests stronger downweighting of zero bins."

  - name: rate_calibrated
    heldin_loss_weight: 0.5
    heldout_loss_weight: 8.0
    zero_count_weight: 1.0
    positive_count_weight: 1.0
    rate_calibration_loss_weight: 0.05
    drift_regularization: 1.0e-4
    notes: "Penalizes mismatch between predicted and observed train-only rates."

  - name: low_dropout_high_heldout
    input_dropout_rate: 0.0
    heldin_loss_weight: 0.5
    heldout_loss_weight: 10.0
    zero_count_weight: 1.0
    positive_count_weight: 1.0
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-5
    notes: "Tests whether input dropout is hurting near-best model."

  - name: short_warmup_high_heldout
    kl_warmup_epochs: 5
    heldin_loss_weight: 0.5
    heldout_loss_weight: 10.0
    kl_scale: 0.01
    zero_count_weight: 1.0
    positive_count_weight: 1.0
    rate_calibration_loss_weight: 0.0
    drift_regularization: 1.0e-4
    notes: "Tests faster KL schedule with held-out emphasis."

references:
  train_mean_validation_bits_per_spike: 0.0
  factor_latent_unified_validation_bits_per_spike: 0.0316438194429199
  previous_neural_ode_refinement_validation_bits_per_spike: 0.0283514699322505
  switching_ode_validation_bits_per_spike: 0.0065057546390714
  oracle_validation_bits_per_spike: 3.5417067067892387

evaluation:
  evaluate_splits:
    - train
    - validation
    - test
  direct_model_primary: true
  also_evaluate_factor_decoder: true
  behavior_decoder_enabled: true

reporting:
  output_dir: results/mc_maze_small/neural_ode_objectives
